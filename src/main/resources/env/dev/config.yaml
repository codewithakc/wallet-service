server:
  applicationConnectors:
    - type: http
      port: 8080
  adminConnectors:
    - type: http
      port: 8081

logging:
  level: INFO
  loggers:
    org.example.wallet: INFO

runtimeMode: INMEMORY

auth:
  customerTokenPrefix: customer-token
  orderServiceToken: order-service-token

companyWallet:
  customerId: platform-company
  initialBalance: 0

outbox:
  pollIntervalMs: 500
  batchSize: 50
